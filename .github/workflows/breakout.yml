name: Generate Breakout SVG

on:
  schedule:
    # Runs every day at 6:00 AM UTC (9:00 AM Helsinki time)
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  generate-svg:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Clone github-breakout and install dependencies
        run: |
          git clone --depth 1 --branch v1.2.4 https://github.com/cyprieng/github-breakout.git /tmp/github-breakout
          cd /tmp/github-breakout && npm ci

      - name: Generate SVGs (no ghost bricks)
        run: |
          node /tmp/github-breakout/dist/cli.js \
            --username ${{ github.repository_owner }} \
            --token ${{ secrets.GITHUB_TOKEN }} \
            --light \
            --dark \
            --no-ghost-bricks \
            --output-path /tmp/breakout-output/

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and force-push SVGs to target branch
        run: |
          git checkout --orphan github-breakout
          git rm -rf .
          mkdir images
          mv /tmp/breakout-output/light.svg images/breakout-light.svg
          mv /tmp/breakout-output/dark.svg images/breakout-dark.svg
          git add images
          git commit -m "chore: update GitHub breakout SVGs" || echo "No changes to commit"
          git push --force origin github-breakout
